<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>1234 數學練習</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans TC', 'Segoe UI', sans-serif;
  min-height: 100dvh;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  color: #fff;
  padding: 16px;
}

/* ── 頂部資訊 ── */
.header {
  text-align: center;
  margin-bottom: 20px;
}
.header h1 { font-size: 2rem; text-shadow: 2px 2px 4px rgba(0,0,0,.3); }
.header .subtitle { font-size: 0.9rem; opacity: .7; margin-top: 4px; }

.stats {
  display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
  margin-bottom: 20px;
}
.stat {
  background: rgba(255,255,255,.15); backdrop-filter: blur(10px);
  padding: 8px 16px; border-radius: 12px; text-align: center; min-width: 70px;
}
.stat .num { font-size: 1.5rem; font-weight: 900; }
.stat .label { font-size: .7rem; opacity: .7; }

/* ── 難度選擇 ── */
.difficulty {
  display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center;
}
.diff-btn {
  padding: 8px 20px; border-radius: 20px; border: 2px solid rgba(255,255,255,.4);
  background: transparent; color: #fff; font-size: .9rem; font-weight: 700;
  cursor: pointer; transition: all .2s;
}
.diff-btn.active { background: #fff; color: #764ba2; border-color: #fff; }

/* ── 題目區 ── */
.question-card {
  background: rgba(255,255,255,.95); color: #333; border-radius: 24px;
  padding: 30px 20px; text-align: center; width: 100%; max-width: 400px;
  box-shadow: 0 20px 60px rgba(0,0,0,.2);
  margin-bottom: 20px;
}
.question { font-size: 2.5rem; font-weight: 900; color: #4a3580; margin-bottom: 20px; }
.question .op { color: #e74c3c; margin: 0 8px; }

/* ── 答案按鈕 ── */
.answers {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
  width: 100%; max-width: 400px;
}
.ans-btn {
  padding: 18px; border-radius: 16px; border: none;
  font-size: 1.8rem; font-weight: 900; cursor: pointer;
  background: rgba(255,255,255,.9); color: #4a3580;
  box-shadow: 0 4px 15px rgba(0,0,0,.15);
  transition: all .15s; position: relative;
}
.ans-btn:active { transform: scale(.95); }
.ans-btn.correct {
  background: #27ae60; color: #fff;
  animation: pop .4s ease;
}
.ans-btn.wrong {
  background: #e74c3c; color: #fff;
  animation: shake .4s ease;
}

/* ── 回饋動畫 ── */
.feedback {
  font-size: 3rem; position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%); pointer-events: none;
  opacity: 0; transition: none;
}
.feedback.show {
  opacity: 1;
  animation: feedbackAnim .8s ease forwards;
}

@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}
@keyframes feedbackAnim {
  0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%, -80%) scale(1.5); }
}

/* ── 連續答對 ── */
.streak {
  position: fixed; top: 10px; right: 10px;
  background: #f39c12; color: #fff; border-radius: 50%;
  width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 1.2rem; box-shadow: 0 4px 12px rgba(0,0,0,.2);
  opacity: 0; transition: all .3s;
}
.streak.show { opacity: 1; transform: scale(1.1); }

/* ── 開始畫面 ── */
.start-screen {
  text-align: center; margin-top: 40px;
}
.start-btn {
  padding: 16px 48px; border-radius: 30px; border: none;
  background: #fff; color: #764ba2; font-size: 1.3rem; font-weight: 900;
  cursor: pointer; box-shadow: 0 8px 25px rgba(0,0,0,.2);
  transition: all .2s;
}
.start-btn:active { transform: scale(.95); }

/* ── 計時器 ── */
.timer {
  font-size: 1rem; opacity: .8; margin-bottom: 4px;
}

/* ── 結算畫面 ── */
.result-screen {
  display: none; text-align: center;
  background: rgba(255,255,255,.95); color: #333; border-radius: 24px;
  padding: 30px 20px; width: 100%; max-width: 400px;
  box-shadow: 0 20px 60px rgba(0,0,0,.2);
}
.result-screen h2 { font-size: 1.8rem; color: #4a3580; margin-bottom: 16px; }
.result-screen .big { font-size: 3rem; font-weight: 900; color: #27ae60; }
.result-screen .detail { font-size: 1rem; color: #666; margin: 12px 0; line-height: 1.8; }
.stars { font-size: 2.5rem; margin: 12px 0; }
</style>
</head>
<body>

<div class="header">
  <h1>🔢 1234 數學練習</h1>
  <div class="subtitle">用 1、2、3、4 練習加減乘除！</div>
</div>

<!-- 難度選擇 -->
<div class="difficulty">
  <button class="diff-btn active" data-level="easy">😊 簡單</button>
  <button class="diff-btn" data-level="medium">🤔 中等</button>
  <button class="diff-btn" data-level="hard">🧠 困難</button>
</div>

<!-- 統計 -->
<div class="stats">
  <div class="stat"><div class="num" id="score">0</div><div class="label">得分</div></div>
  <div class="stat"><div class="num" id="total">0</div><div class="label">題數</div></div>
  <div class="stat"><div class="num" id="accuracy">-</div><div class="label">正確率</div></div>
  <div class="stat"><div class="num" id="timerDisplay">60</div><div class="label">秒</div></div>
</div>

<!-- 題目 -->
<div class="question-card" id="questionCard" style="display:none;">
  <div class="question" id="question"></div>
  <div style="font-size:.9rem; color:#999;">選出正確答案</div>
</div>

<!-- 答案按鈕 -->
<div class="answers" id="answers" style="display:none;"></div>

<!-- 開始畫面 -->
<div class="start-screen" id="startScreen">
  <p style="font-size:1.1rem; margin-bottom:20px; opacity:.8;">
    60 秒內答對越多題越好！<br>連續答對有加分 🔥
  </p>
  <button class="start-btn" onclick="startGame()">開始挑戰！ 🚀</button>
</div>

<!-- 結算 -->
<div class="result-screen" id="resultScreen">
  <h2>⏰ 時間到！</h2>
  <div class="stars" id="stars"></div>
  <div class="big" id="finalScore"></div>
  <div class="detail" id="resultDetail"></div>
  <button class="start-btn" onclick="startGame()" style="margin-top:16px;">再玩一次 🔄</button>
</div>

<!-- 回饋 -->
<div class="feedback" id="feedback"></div>
<!-- 連續答對 -->
<div class="streak" id="streak">🔥0</div>

<script>
const NUMS = [1, 2, 3, 4];
let level = 'easy';
let score = 0, total = 0, correct = 0, streak = 0, timer = 60, interval;
let currentAnswer = 0;
let canAnswer = true;

// 難度設定
const LEVELS = {
  easy:   { ops: ['+', '-'], range: [1, 2, 3, 4], label: '加減' },
  medium: { ops: ['+', '-', '×'], range: [1, 2, 3, 4], label: '加減乘' },
  hard:   { ops: ['+', '-', '×', '÷'], range: [1, 2, 3, 4], label: '加減乘除' },
};

// 難度按鈕
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    level = btn.dataset.level;
  });
});

function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }

function generateQuestion() {
  const cfg = LEVELS[level];
  let a, b, op, answer;
  let attempts = 0;

  do {
    a = rand(cfg.range);
    b = rand(cfg.range);
    op = rand(cfg.ops);

    switch (op) {
      case '+': answer = a + b; break;
      case '-':
        if (a < b) [a, b] = [b, a]; // 確保不會出現負數
        answer = a - b; break;
      case '×': answer = a * b; break;
      case '÷':
        // 確保整除
        answer = a;
        a = a * b;
        break;
    }
    attempts++;
  } while (answer < 0 && attempts < 20);

  currentAnswer = answer;

  // 產生選項（1 正確 + 3 錯誤）
  const options = new Set([answer]);
  while (options.size < 4) {
    let wrong = answer + rand([-3, -2, -1, 1, 2, 3]);
    if (wrong >= 0 && wrong !== answer) options.add(wrong);
  }

  document.getElementById('question').innerHTML =
    `${a} <span class="op">${op}</span> ${b} = ?`;

  const ansDiv = document.getElementById('answers');
  ansDiv.innerHTML = '';
  shuffle([...options]).forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.textContent = opt;
    btn.addEventListener('click', () => checkAnswer(btn, opt));
    ansDiv.appendChild(btn);
  });
}

function checkAnswer(btn, selected) {
  if (!canAnswer) return;
  canAnswer = false;
  total++;

  if (selected === currentAnswer) {
    correct++;
    streak++;
    const bonus = Math.min(streak, 5);
    score += bonus;
    btn.classList.add('correct');
    showFeedback(streak >= 3 ? '🔥 連續 ' + streak + ' 題！' : ['👍', '✨', '🎉', '💪'][Math.floor(Math.random() * 4)]);
  } else {
    streak = 0;
    btn.classList.add('wrong');
    // 顯示正確答案
    document.querySelectorAll('.ans-btn').forEach(b => {
      if (parseInt(b.textContent) === currentAnswer) b.classList.add('correct');
    });
    showFeedback('❌');
  }

  updateStats();
  updateStreak();

  setTimeout(() => {
    canAnswer = true;
    generateQuestion();
  }, selected === currentAnswer ? 400 : 800);
}

function showFeedback(text) {
  const el = document.getElementById('feedback');
  el.textContent = text;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}

function updateStats() {
  document.getElementById('score').textContent = score;
  document.getElementById('total').textContent = total;
  document.getElementById('accuracy').textContent = total > 0 ? Math.round(correct / total * 100) + '%' : '-';
}

function updateStreak() {
  const el = document.getElementById('streak');
  if (streak >= 2) {
    el.textContent = '🔥' + streak;
    el.classList.add('show');
  } else {
    el.classList.remove('show');
  }
}

function startGame() {
  score = 0; total = 0; correct = 0; streak = 0; timer = 60;
  canAnswer = true;
  updateStats();
  updateStreak();

  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('questionCard').style.display = '';
  document.getElementById('answers').style.display = '';

  generateQuestion();

  clearInterval(interval);
  interval = setInterval(() => {
    timer--;
    document.getElementById('timerDisplay').textContent = timer;
    if (timer <= 0) {
      clearInterval(interval);
      endGame();
    }
  }, 1000);
}

function endGame() {
  canAnswer = false;
  document.getElementById('questionCard').style.display = 'none';
  document.getElementById('answers').style.display = 'none';

  const pct = total > 0 ? Math.round(correct / total * 100) : 0;
  const starCount = pct >= 90 ? 3 : pct >= 70 ? 2 : pct >= 50 ? 1 : 0;

  document.getElementById('stars').textContent = '⭐'.repeat(starCount) + '☆'.repeat(3 - starCount);
  document.getElementById('finalScore').textContent = score + ' 分';
  document.getElementById('resultDetail').innerHTML =
    `答對 <b>${correct}</b> / ${total} 題<br>正確率 <b>${pct}%</b><br>難度：${LEVELS[level].label}`;

  document.getElementById('resultScreen').style.display = '';
}
</script>
</body>
</html>
