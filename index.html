<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ж•ёеӯёй«ҳжүӢжҢ‘жҲ°</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans TC', 'Segoe UI', sans-serif;
  min-height: 100dvh;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  color: #fff;
  padding: 16px;
}

/* в”Җв”Җ й ӮйғЁиіҮиЁҠ в”Җв”Җ */
.header {
  text-align: center;
  margin-bottom: 16px;
}
.header h1 { font-size: 1.8rem; text-shadow: 2px 2px 4px rgba(0,0,0,.3); }
.header .subtitle { font-size: 0.85rem; opacity: .7; margin-top: 4px; }

.stats {
  display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
  margin-bottom: 16px;
}
.stat {
  background: rgba(255,255,255,.15); backdrop-filter: blur(10px);
  padding: 6px 14px; border-radius: 12px; text-align: center; min-width: 65px;
}
.stat .num { font-size: 1.4rem; font-weight: 900; }
.stat .label { font-size: .65rem; opacity: .7; }

/* в”Җв”Җ йӣЈеәҰйҒёж“Ү в”Җв”Җ */
.difficulty {
  display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; justify-content: center;
}
.diff-btn {
  padding: 7px 14px; border-radius: 20px; border: 2px solid rgba(255,255,255,.4);
  background: transparent; color: #fff; font-size: .8rem; font-weight: 700;
  cursor: pointer; transition: all .2s;
}
.diff-btn.active { background: #fff; color: #764ba2; border-color: #fff; }

/* в”Җв”Җ йЎҢзӣ®еҚҖ в”Җв”Җ */
.question-card {
  background: rgba(255,255,255,.95); color: #333; border-radius: 24px;
  padding: 28px 20px; text-align: center; width: 100%; max-width: 400px;
  box-shadow: 0 20px 60px rgba(0,0,0,.2);
  margin-bottom: 16px;
}
.question { font-size: 2.2rem; font-weight: 900; color: #4a3580; margin-bottom: 16px; letter-spacing: 2px; }
.question .op { color: #e74c3c; margin: 0 6px; }
.hint { font-size: .85rem; color: #999; }

/* в”Җв”Җ зӯ”жЎҲжҢүйҲ• в”Җв”Җ */
.answers {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
  width: 100%; max-width: 400px;
}
.ans-btn {
  padding: 16px; border-radius: 16px; border: none;
  font-size: 1.6rem; font-weight: 900; cursor: pointer;
  background: rgba(255,255,255,.9); color: #4a3580;
  box-shadow: 0 4px 15px rgba(0,0,0,.15);
  transition: all .15s; position: relative;
}
.ans-btn:active { transform: scale(.95); }
.ans-btn.correct {
  background: #27ae60; color: #fff;
  animation: pop .4s ease;
}
.ans-btn.wrong {
  background: #e74c3c; color: #fff;
  animation: shake .4s ease;
}

/* в”Җв”Җ еӣһйҘӢеӢ•з•« в”Җв”Җ */
.feedback {
  font-size: 3rem; position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%); pointer-events: none;
  opacity: 0; transition: none;
}
.feedback.show {
  opacity: 1;
  animation: feedbackAnim .8s ease forwards;
}

@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}
@keyframes feedbackAnim {
  0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%, -80%) scale(1.5); }
}

/* в”Җв”Җ йҖЈзәҢзӯ”е°Қ в”Җв”Җ */
.streak {
  position: fixed; top: 10px; right: 10px;
  background: #f39c12; color: #fff; border-radius: 50%;
  width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 1.2rem; box-shadow: 0 4px 12px rgba(0,0,0,.2);
  opacity: 0; transition: all .3s;
}
.streak.show { opacity: 1; transform: scale(1.1); }

/* в”Җв”Җ й–Ӣе§Ӣз•«йқў в”Җв”Җ */
.start-screen {
  text-align: center; margin-top: 20px;
}
.start-btn {
  padding: 14px 44px; border-radius: 30px; border: none;
  background: #fff; color: #764ba2; font-size: 1.2rem; font-weight: 900;
  cursor: pointer; box-shadow: 0 8px 25px rgba(0,0,0,.2);
  transition: all .2s;
}
.start-btn:active { transform: scale(.95); }

/* в”Җв”Җ иЁҲжҷӮжўқ в”Җв”Җ */
.timer-bar-wrap {
  width: 100%; max-width: 400px; height: 8px;
  background: rgba(255,255,255,.2); border-radius: 4px;
  margin-bottom: 16px; overflow: hidden;
}
.timer-bar {
  height: 100%; background: #2ecc71; border-radius: 4px;
  transition: width 1s linear, background .5s;
}
.timer-bar.warning { background: #f39c12; }
.timer-bar.danger { background: #e74c3c; }

/* в”Җв”Җ зөҗз®—з•«йқў в”Җв”Җ */
.result-screen {
  display: none; text-align: center;
  background: rgba(255,255,255,.95); color: #333; border-radius: 24px;
  padding: 28px 20px; width: 100%; max-width: 400px;
  box-shadow: 0 20px 60px rgba(0,0,0,.2);
}
.result-screen h2 { font-size: 1.6rem; color: #4a3580; margin-bottom: 12px; }
.result-screen .big { font-size: 2.8rem; font-weight: 900; color: #27ae60; }
.result-screen .detail { font-size: .95rem; color: #666; margin: 12px 0; line-height: 1.8; }
.stars { font-size: 2.5rem; margin: 10px 0; }
.result-screen .record { font-size: .8rem; color: #e67e22; margin-top: 8px; }
</style>
</head>
<body>

<div class="header">
  <h1>рҹ§® ж•ёеӯёй«ҳжүӢжҢ‘жҲ°</h1>
  <div class="subtitle">еңӢе°ҸдёүпҪһе…ӯе№ҙзҙҡж•ёеӯёз·ҙзҝ’</div>
</div>

<!-- йӣЈеәҰйҒёж“Ү -->
<div class="difficulty">
  <button class="diff-btn active" data-level="g3">дёүе№ҙзҙҡ</button>
  <button class="diff-btn" data-level="g4">еӣӣе№ҙзҙҡ</button>
  <button class="diff-btn" data-level="g5">дә”е№ҙзҙҡ</button>
  <button class="diff-btn" data-level="g6">е…ӯе№ҙзҙҡ</button>
</div>

<!-- зөұиЁҲ -->
<div class="stats">
  <div class="stat"><div class="num" id="score">0</div><div class="label">еҫ—еҲҶ</div></div>
  <div class="stat"><div class="num" id="total">0</div><div class="label">йЎҢж•ё</div></div>
  <div class="stat"><div class="num" id="accuracy">-</div><div class="label">жӯЈзўәзҺҮ</div></div>
  <div class="stat"><div class="num" id="timerDisplay">90</div><div class="label">з§’</div></div>
</div>

<!-- иЁҲжҷӮжўқ -->
<div class="timer-bar-wrap" id="timerBarWrap" style="display:none;">
  <div class="timer-bar" id="timerBar" style="width:100%"></div>
</div>

<!-- йЎҢзӣ® -->
<div class="question-card" id="questionCard" style="display:none;">
  <div class="question" id="question"></div>
  <div class="hint" id="hint">йҒёеҮәжӯЈзўәзӯ”жЎҲ</div>
</div>

<!-- зӯ”жЎҲжҢүйҲ• -->
<div class="answers" id="answers" style="display:none;"></div>

<!-- й–Ӣе§Ӣз•«йқў -->
<div class="start-screen" id="startScreen">
  <p style="font-size:1rem; margin-bottom:20px; opacity:.8; line-height:1.6;">
    90 з§’е…§зӯ”е°Қи¶ҠеӨҡйЎҢи¶ҠеҘҪпјҒ<br>
    йҖЈзәҢзӯ”е°ҚжңүеҠ еҲҶ рҹ”Ҙ<br>
    <span style="font-size:.85rem;">йҒёж“ҮдҪ зҡ„е№ҙзҙҡй–Ӣе§ӢжҢ‘жҲ°еҗ§пјҒ</span>
  </p>
  <button class="start-btn" onclick="startGame()">й–Ӣе§ӢжҢ‘жҲ°пјҒ рҹҡҖ</button>
</div>

<!-- зөҗз®— -->
<div class="result-screen" id="resultScreen">
  <h2>вҸ° жҷӮй–“еҲ°пјҒ</h2>
  <div class="stars" id="stars"></div>
  <div class="big" id="finalScore"></div>
  <div class="detail" id="resultDetail"></div>
  <div class="record" id="recordMsg"></div>
  <button class="start-btn" onclick="startGame()" style="margin-top:14px;">еҶҚзҺ©дёҖж¬Ў рҹ”„</button>
</div>

<!-- еӣһйҘӢ -->
<div class="feedback" id="feedback"></div>
<!-- йҖЈзәҢзӯ”е°Қ -->
<div class="streak" id="streak">рҹ”Ҙ0</div>

<script>
let level = 'g3';
let score = 0, total = 0, correct = 0, streak = 0, maxStreak = 0;
let timer = 90, maxTime = 90, interval;
let currentAnswer = 0;
let canAnswer = true;

// жңҖй«ҳеҲҶзҙҖйҢ„пјҲlocalStorageпјү
function getRecord(lv) {
  return parseInt(localStorage.getItem('mathpro_record_' + lv) || '0');
}
function setRecord(lv, s) {
  if (s > getRecord(lv)) { localStorage.setItem('mathpro_record_' + lv, s); return true; }
  return false;
}

// йӣЈеәҰжҢүйҲ•
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    level = btn.dataset.level;
  });
});

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function randItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }

function generateQuestion() {
  let a, b, op, answer, display;

  switch (level) {
    case 'g3': {
      // дёүе№ҙзҙҡпјҡе…©дҪҚж•ёеҠ жёӣгҖҒд№қд№қд№ҳжі•
      const type = randItem(['+', '-', 'Г—']);
      if (type === 'Г—') {
        a = rand(2, 9);
        b = rand(2, 9);
        answer = a * b;
        op = 'Г—';
      } else if (type === '+') {
        a = rand(10, 99);
        b = rand(10, 99);
        answer = a + b;
        op = '+';
      } else {
        a = rand(20, 99);
        b = rand(10, a);
        answer = a - b;
        op = '-';
      }
      break;
    }
    case 'g4': {
      // еӣӣе№ҙзҙҡпјҡдёүдҪҚж•ёеҠ жёӣгҖҒе…©дҪҚГ—дёҖдҪҚгҖҒз°Ўе–®йҷӨжі•
      const type = randItem(['+', '-', 'Г—', 'Г·']);
      if (type === '+') {
        a = rand(100, 999);
        b = rand(100, 999);
        answer = a + b;
        op = '+';
      } else if (type === '-') {
        a = rand(200, 999);
        b = rand(100, a);
        answer = a - b;
        op = '-';
      } else if (type === 'Г—') {
        a = rand(11, 49);
        b = rand(2, 9);
        answer = a * b;
        op = 'Г—';
      } else {
        b = rand(2, 9);
        answer = rand(3, 30);
        a = answer * b;
        op = 'Г·';
      }
      break;
    }
    case 'g5': {
      // дә”е№ҙзҙҡпјҡеӨ§ж•ёеҠ жёӣгҖҒе…©дҪҚГ—е…©дҪҚгҖҒйҷӨжі•пјҲеҗ«ијғеӨ§ж•ёпјүгҖҒж··еҗҲ
      const type = randItem(['+', '-', 'Г—', 'Г·', 'Г—', 'Г·']);
      if (type === '+') {
        a = rand(500, 9999);
        b = rand(500, 9999);
        answer = a + b;
        op = '+';
      } else if (type === '-') {
        a = rand(1000, 9999);
        b = rand(100, a);
        answer = a - b;
        op = '-';
      } else if (type === 'Г—') {
        a = rand(11, 99);
        b = rand(11, 50);
        answer = a * b;
        op = 'Г—';
      } else {
        b = rand(3, 20);
        answer = rand(5, 50);
        a = answer * b;
        op = 'Г·';
      }
      break;
    }
    case 'g6': {
      // е…ӯе№ҙзҙҡпјҡеӨ§ж•ёйҒӢз®—гҖҒдёүдҪҚГ—е…©дҪҚгҖҒијғйӣЈйҷӨжі•гҖҒеҗ«иІ ж•ёжҰӮеҝө
      const type = randItem(['+', '-', 'Г—', 'Г·', 'Г—', 'Г·']);
      if (type === '+') {
        a = rand(1000, 99999);
        b = rand(1000, 99999);
        answer = a + b;
        op = '+';
      } else if (type === '-') {
        a = rand(5000, 99999);
        b = rand(1000, a);
        answer = a - b;
        op = '-';
      } else if (type === 'Г—') {
        a = rand(100, 500);
        b = rand(11, 99);
        answer = a * b;
        op = 'Г—';
      } else {
        b = rand(5, 50);
        answer = rand(10, 200);
        a = answer * b;
        op = 'Г·';
      }
      break;
    }
  }

  currentAnswer = answer;

  // йЎҜзӨәйЎҢзӣ®пјҲеӨ§ж•ёеҠ еҚғеҲҶдҪҚйҖ—иҷҹпјү
  const fmt = n => n >= 1000 ? n.toLocaleString() : n.toString();
  document.getElementById('question').innerHTML =
    `${fmt(a)} <span class="op">${op}</span> ${fmt(b)} = ?`;

  // з”ўз”ҹйҒёй …пјҲ1 жӯЈзўә + 3 йҢҜиӘӨпјү
  const options = new Set([answer]);
  let tries = 0;
  while (options.size < 4 && tries < 100) {
    tries++;
    let offset;
    if (answer <= 20) {
      offset = randItem([-3, -2, -1, 1, 2, 3]);
    } else if (answer <= 100) {
      offset = randItem([-10, -5, -3, -1, 1, 3, 5, 10]);
    } else if (answer <= 1000) {
      offset = rand(-50, 50);
      if (offset === 0) offset = rand(1, 20);
    } else {
      // еӨ§ж•ёпјҡз”ўз”ҹжңүж„Ҹзҫ©зҡ„е№Іж“ҫй …пјҲеҖӢдҪҚжҲ–еҚҒдҪҚдёҚеҗҢпјү
      const mag = Math.pow(10, Math.floor(Math.log10(answer)) - 1);
      offset = randItem([-2, -1, 1, 2]) * Math.max(1, Math.floor(mag * Math.random()) + 1);
      if (offset === 0) offset = rand(1, 100);
    }
    const wrong = answer + offset;
    if (wrong >= 0 && wrong !== answer) options.add(wrong);
  }

  const ansDiv = document.getElementById('answers');
  ansDiv.innerHTML = '';
  shuffle([...options]).forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.textContent = fmt(opt);
    btn.addEventListener('click', () => checkAnswer(btn, opt));
    ansDiv.appendChild(btn);
  });
}

function checkAnswer(btn, selected) {
  if (!canAnswer) return;
  canAnswer = false;
  total++;

  if (selected === currentAnswer) {
    correct++;
    streak++;
    if (streak > maxStreak) maxStreak = streak;
    const bonus = Math.min(streak, 5);
    score += bonus;
    btn.classList.add('correct');
    if (streak >= 5) showFeedback('рҹ”Ҙрҹ”Ҙ и¶…еј·пјҒ');
    else if (streak >= 3) showFeedback('рҹ”Ҙ йҖЈзәҢ ' + streak + ' йЎҢпјҒ');
    else showFeedback(randItem(['рҹ‘Қ', 'вңЁ', 'рҹҺү', 'рҹ’Ә', 'рҹ‘Ҹ']));
  } else {
    streak = 0;
    btn.classList.add('wrong');
    document.querySelectorAll('.ans-btn').forEach(b => {
      if (parseInt(b.textContent.replace(/,/g, '')) === currentAnswer) b.classList.add('correct');
    });
    showFeedback('вқҢ');
  }

  updateStats();
  updateStreak();

  setTimeout(() => {
    canAnswer = true;
    generateQuestion();
  }, selected === currentAnswer ? 400 : 1000);
}

function showFeedback(text) {
  const el = document.getElementById('feedback');
  el.textContent = text;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}

function updateStats() {
  document.getElementById('score').textContent = score;
  document.getElementById('total').textContent = total;
  document.getElementById('accuracy').textContent = total > 0 ? Math.round(correct / total * 100) + '%' : '-';
}

function updateStreak() {
  const el = document.getElementById('streak');
  if (streak >= 2) {
    el.textContent = 'рҹ”Ҙ' + streak;
    el.classList.add('show');
  } else {
    el.classList.remove('show');
  }
}

function updateTimerBar() {
  const pct = (timer / maxTime) * 100;
  const bar = document.getElementById('timerBar');
  bar.style.width = pct + '%';
  bar.classList.remove('warning', 'danger');
  if (pct <= 20) bar.classList.add('danger');
  else if (pct <= 40) bar.classList.add('warning');
}

function startGame() {
  score = 0; total = 0; correct = 0; streak = 0; maxStreak = 0;
  timer = maxTime;
  canAnswer = true;
  updateStats();
  updateStreak();

  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('questionCard').style.display = '';
  document.getElementById('answers').style.display = '';
  document.getElementById('timerBarWrap').style.display = '';

  generateQuestion();

  clearInterval(interval);
  interval = setInterval(() => {
    timer--;
    document.getElementById('timerDisplay').textContent = timer;
    updateTimerBar();
    if (timer <= 0) {
      clearInterval(interval);
      endGame();
    }
  }, 1000);
}

function endGame() {
  canAnswer = false;
  document.getElementById('questionCard').style.display = 'none';
  document.getElementById('answers').style.display = 'none';
  document.getElementById('timerBarWrap').style.display = 'none';

  const pct = total > 0 ? Math.round(correct / total * 100) : 0;
  const starCount = pct >= 90 ? 3 : pct >= 70 ? 2 : pct >= 50 ? 1 : 0;

  const levelNames = { g3: 'дёүе№ҙзҙҡ', g4: 'еӣӣе№ҙзҙҡ', g5: 'дә”е№ҙзҙҡ', g6: 'е…ӯе№ҙзҙҡ' };

  document.getElementById('stars').textContent = 'вӯҗ'.repeat(starCount) + 'вҳҶ'.repeat(3 - starCount);
  document.getElementById('finalScore').textContent = score + ' еҲҶ';
  document.getElementById('resultDetail').innerHTML =
    `зӯ”е°Қ <b>${correct}</b> / ${total} йЎҢ<br>жӯЈзўәзҺҮ <b>${pct}%</b><br>жңҖй«ҳйҖЈзәҢзӯ”е°Қ <b>${maxStreak}</b> йЎҢ<br>йӣЈеәҰпјҡ${levelNames[level]}`;

  const isNew = setRecord(level, score);
  const recordEl = document.getElementById('recordMsg');
  if (isNew) {
    recordEl.textContent = 'рҹҸҶ ж–°зҙҖйҢ„пјҒ';
  } else {
    recordEl.textContent = 'жңҖй«ҳзҙҖйҢ„пјҡ' + getRecord(level) + ' еҲҶ';
  }

  document.getElementById('resultScreen').style.display = '';
}
</script>
</body>
</html>
